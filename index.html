<!DOCTYPE html>
<html lang='pt-BR'>

<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Cadastro de Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h1 class="mb-0">Cadastro</h1>
                    </div>

                    <div class="card-body">
                        <form>
                            <div class="mb-3">
                                <label for="clientName" class="form-label">Nome do Cliente:</label>
                                <input type="text" id="clientName" class="form-control"
                                    placeholder="Escreva aqui o nome do cliente." />
                            </div>

                            <div class="mb-3">
                                <label for="clientCPF" class="form-label">CPF do Cliente:</label>
                                <input type="text" id="clientCPF" class="form-control"
                                    placeholder="Escreva aqui o cpf do cliente." />
                            </div>

                            <div class="mb-3">
                                <label for="clientTel" class="form-label">Telefone do Cliente:</label>
                                <input type="text" id="clientTel" class="form-control"
                                    placeholder="Escreva aqui o telefone do cliente." />
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
